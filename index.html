<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Motopartes RR</title>
<script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,-apple-system,sans-serif;background:#f2f1ef;color:#1a1a18;font-size:14px;overflow-x:hidden}
input,select,textarea,button{font-family:inherit;font-size:inherit}
input:focus,select:focus{outline:none;box-shadow:0 0 0 2px #BA751750}
button:focus{outline:none}

/* ── LAYOUT ── */
#app{display:flex;min-height:100vh}
#sidebar{position:fixed;left:0;top:0;width:230px;height:100vh;background:#18181a;color:#e8e5df;z-index:100;display:flex;flex-direction:column;overflow-y:auto}
#content{margin-left:230px;flex:1;min-height:100vh}
#bottom-nav{display:none}

/* ── SIDEBAR ── */
.side-logo{padding:1.1rem 1.1rem .8rem;border-bottom:1px solid #2e2e2c;display:flex;align-items:center;gap:10px}
.side-logo-badge{width:36px;height:36px;border-radius:8px;background:#BA7517;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:13px;color:#fff;flex-shrink:0}
.side-logo-text{font-size:13px;font-weight:700;line-height:1.2;color:#fff}
.side-logo-sub{font-size:10px;color:#888780;letter-spacing:.4px}
.side-nav{padding:.5rem 0;flex:1}
.nav-item{display:flex;align-items:center;gap:10px;padding:10px 1.1rem;cursor:pointer;font-size:13px;color:#a09d97;transition:all .15s;border-left:3px solid transparent;text-decoration:none;width:100%;background:none;border-right:none;border-top:none;border-bottom:none;text-align:left}
.nav-item:hover{background:rgba(255,255,255,.05);color:#e8e5df}
.nav-item.active{background:rgba(186,117,23,.12);color:#f0b429;border-left-color:#BA7517;font-weight:700}
.nav-icon{font-size:16px;width:20px;text-align:center;flex-shrink:0}
.side-footer{padding:.75rem 1.1rem;border-top:1px solid #2e2e2c;font-size:11px;color:#444441}

/* ── MOBILE ── */
@media(max-width:768px){
  #sidebar{display:none}
  #content{margin-left:0;padding-bottom:64px}
  #bottom-nav{display:flex;position:fixed;bottom:0;left:0;right:0;height:60px;background:#fff;border-top:1px solid #e5e4dc;z-index:100;box-shadow:0 -2px 8px rgba(0,0,0,.08)}
  .bnav-item{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;cursor:pointer;font-size:9px;color:#888780;transition:color .15s;border:none;background:none;padding:0}
  .bnav-item.active{color:#BA7517}
  .bnav-item.active .bnav-icon{background:#FFF3D6;border-radius:12px;padding:4px 12px}
  .bnav-icon{font-size:18px;line-height:1}
}

/* ── CARDS ── */
.card{background:#fff;border:0.5px solid #d8d6cf;border-radius:10px;overflow:hidden}
.kpi-card{background:#fff;border:0.5px solid #d8d6cf;border-radius:10px;padding:14px 16px}

/* ── TABLES ── */
table{border-collapse:collapse;width:100%}
th,td{text-align:left;padding:9px 10px;border-bottom:0.5px solid #e5e4dc;vertical-align:top}
th{font-size:11px;color:#888780;font-weight:600;white-space:nowrap;background:#f9f9f7;text-transform:uppercase;letter-spacing:.3px;cursor:pointer}
th.ns{cursor:default}
th:not(.ns):hover{color:#1a1a18}
tbody tr:hover td{background:#f8f7f5}
.tbl-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch}

/* ── MOV CARDS (mobile) ── */
.mov-card{border:0.5px solid #e5e4dc;border-radius:8px;padding:10px 12px;background:#fff;margin-bottom:8px}
.desktop-tbl{display:block}
.mobile-cards{display:none}
@media(max-width:640px){
  .desktop-tbl{display:none}
  .mobile-cards{display:block}
  .hide-mob{display:none!important}
  .grid2{grid-template-columns:1fr!important}
  .col2{grid-column:1!important}
}

/* ── BUTTONS ── */
.btn{padding:7px 14px;border-radius:6px;cursor:pointer;font-size:13px;transition:opacity .15s,transform .1s;border:0.5px solid #d3d1c7;background:#fff;color:#444441}
.btn:hover{opacity:.82}
.btn:active{transform:scale(.97)}
.btn-primary{background:#FAEEDA;border-color:#BA7517;color:#854F0B;font-weight:600}
.btn-danger{background:#FCEBEB;border-color:#f09595;color:#A32D2D}
.btn-info{background:#E6F1FB;border-color:#85B7EB;color:#185FA5}
.btn-success{background:#EAF3DE;border-color:#97C459;color:#3B6D11}
.btn-sm{padding:4px 10px;font-size:12px}
.btn-xs{padding:3px 8px;font-size:11px}

/* ── FORMS ── */
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.col2{grid-column:1/-1}
label.lbl{display:block;font-size:12px;color:#5f5e5a;margin-bottom:3px;margin-top:11px;font-weight:500}
label.lbl:first-child{margin-top:0}
.finput{width:100%;padding:8px 10px;font-size:13px;border:0.5px solid #b4b2a9;border-radius:6px;background:#fff;color:#1a1a18}
.finput:focus{box-shadow:0 0 0 2px #BA751740}
.pill{padding:5px 12px;border-radius:20px;font-size:12px;cursor:pointer;border:0.5px solid #d3d1c7;background:#fff;color:#5f5e5a;transition:all .12s}
.pill.active{background:#FAEEDA;border-color:#BA7517;color:#854F0B;font-weight:700}

/* ── MODAL ── */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:300;display:flex;align-items:center;justify-content:center;padding:1rem}
.modal-box{background:#fff;border-radius:12px;width:96%;max-width:500px;max-height:92vh;overflow-y:auto;padding:1.5rem;box-shadow:0 24px 64px rgba(0,0,0,.22)}

/* ── DASH BARS ── */
.bar-track{background:#f2f1ef;border-radius:4px;height:7px;overflow:hidden;margin-top:4px}
.bar-fill{height:100%;border-radius:4px;transition:width .6s ease}

/* ── MISC ── */
.section-title{font-size:15px;font-weight:800;margin-bottom:12px;color:#1a1a18}
.badge{display:inline-block;padding:2px 8px;border-radius:4px;font-size:11px;font-weight:600}
.page-pad{padding:1.25rem;max-width:1180px;margin:0 auto}
.filter-section{background:#fff;border:0.5px solid #d8d6cf;border-radius:8px;padding:12px 14px;margin-bottom:1rem}
.tag-cil{display:inline-block;padding:1px 7px;border-radius:10px;font-size:11px;font-weight:600;border:0.5px solid;margin:1px}
.empty-state{text-align:center;padding:2.5rem 1rem;color:#888780}
</style>
</head>
<body>
<div id="root"></div>
<script>
// ═══════════════════════════════════════════════
// CONSTANTES
// ═══════════════════════════════════════════════
const CATS=["Frenos","Cadenas y piñones","Filtros","Lubricantes","Eléctrico","Carrocería","Suspensión","Motor","Neumáticos","Accesorios"];
const CAT_C={"Frenos":"#E24B4A","Cadenas y piñones":"#BA7517","Filtros":"#185FA5","Lubricantes":"#0F6E56","Eléctrico":"#7F77DD","Carrocería":"#888780","Suspensión":"#D85A30","Motor":"#993556","Neumáticos":"#1D9E75","Accesorios":"#3B6D11"};
const TIPOS=["Repuesto original","Genérico/Compatible","Aftermarket","Performance"];
const CILINDS=["110cc","125cc","150cc","200cc","250cc+","Universal"];
const CIL_C={"110cc":"#7F77DD","125cc":"#185FA5","150cc":"#0F6E56","200cc":"#D85A30","250cc+":"#993556","Universal":"#888780"};
const LOW=5;
const esc=s=>String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
const fmt=n=>Number(n).toLocaleString("es-AR");
const TS=()=>new Date().toLocaleString("es-AR",{day:"2-digit",month:"2-digit",year:"numeric",hour:"2-digit",minute:"2-digit"});

const NAV=[
  {id:"dashboard",icon:"🏠",label:"Dashboard"},
  {id:"inventario",icon:"📦",label:"Inventario"},
  {id:"movimientos",icon:"↕",icon2:"↕️",label:"Movimientos"},
  {id:"historial",icon:"📋",label:"Historial"},
  {id:"proveedores",icon:"🏪",label:"Proveedores"},
];

// ═══════════════════════════════════════════════
// DATOS DEFAULT
// ═══════════════════════════════════════════════
const DEF_PROV=[
  {id:1,nombre:"Brembo",contacto:"Carlos Méndez",telefono:"0261-4101234",email:"cmendez@brembo.com",notas:"Pago a 30 días"},
  {id:2,nombre:"NGK Argentina",contacto:"Distribuidora Sur",telefono:"0261-4205678",email:"ventas@ngk-ar.com",notas:""},
  {id:3,nombre:"Motul Argentina",contacto:"Depósito central",telefono:"0261-4309999",email:"mendoza@motul.com.ar",notas:"Entrega miércoles"},
  {id:4,nombre:"DID Chains",contacto:"Importadora Andina",telefono:"0261-4411111",email:"pedidos@did-ar.com",notas:""},
  {id:5,nombre:"Genérico",contacto:"—",telefono:"—",email:"—",notas:"Sin marca específica"},
];
const DEF_PROD=[
  {id:1,codigo:"7790895000719",nombre:"Pastillas freno delantero",categoria:"Frenos",tipo:"Repuesto original",proveedorId:1,precio:4500,stock:12,stockMin:3,ubicacion:"A-1",descripcion:"Honda CB125, CG150",cilindradas:["125cc","150cc"]},
  {id:2,codigo:"7790895000726",nombre:"Disco freno trasero 220mm",categoria:"Frenos",tipo:"Aftermarket",proveedorId:1,precio:8900,stock:3,stockMin:2,ubicacion:"A-2",descripcion:"Honda Bros 160, Titan 160",cilindradas:["150cc"]},
  {id:3,codigo:"7897753700028",nombre:"Cadena 428×120 eslabones",categoria:"Cadenas y piñones",tipo:"Repuesto original",proveedorId:4,precio:3200,stock:8,stockMin:3,ubicacion:"B-1",descripcion:"Universal 125cc",cilindradas:["125cc"]},
  {id:4,codigo:"7891010703023",nombre:"Filtro aceite HF116",categoria:"Filtros",tipo:"Repuesto original",proveedorId:5,precio:1200,stock:24,stockMin:5,ubicacion:"C-2",descripcion:"Honda CG150, XR150",cilindradas:["125cc","150cc"]},
  {id:5,codigo:"3374650014690",nombre:"Aceite motor 4T 20W50 1L",categoria:"Lubricantes",tipo:"Repuesto original",proveedorId:3,precio:2800,stock:2,stockMin:3,ubicacion:"D-1",descripcion:"Universal 4 tiempos",cilindradas:["Universal"]},
  {id:6,codigo:"4902043100822",nombre:"Bujía NGK CR7HSA",categoria:"Eléctrico",tipo:"Repuesto original",proveedorId:2,precio:950,stock:18,stockMin:5,ubicacion:"E-3",descripcion:"Honda 125cc/150cc",cilindradas:["125cc","150cc"]},
  {id:7,codigo:"0849197007316",nombre:"Amortiguador trasero 340mm",categoria:"Suspensión",tipo:"Aftermarket",proveedorId:5,precio:12500,stock:5,stockMin:2,ubicacion:"F-1",descripcion:"Honda CG150, Titan 150",cilindradas:["150cc"]},
  {id:8,codigo:"7790001000041",nombre:"Espejo retrovisor universal",categoria:"Accesorios",tipo:"Genérico/Compatible",proveedorId:5,precio:1800,stock:7,stockMin:2,ubicacion:"G-2",descripcion:"Universal",cilindradas:["Universal"]},
  {id:9,codigo:"7790895001100",nombre:"Pastillas freno Honda Wave 110",categoria:"Frenos",tipo:"Genérico/Compatible",proveedorId:1,precio:2800,stock:9,stockMin:3,ubicacion:"A-3",descripcion:"Honda Wave 110, Biz 110",cilindradas:["110cc"]},
  {id:10,codigo:"7897753700110",nombre:"Cadena 420×116 (110cc)",categoria:"Cadenas y piñones",tipo:"Repuesto original",proveedorId:4,precio:2400,stock:6,stockMin:3,ubicacion:"B-2",descripcion:"Yamaha Crypton, Honda Biz 110",cilindradas:["110cc"]},
];

// ═══════════════════════════════════════════════
// ESTADO
// ═══════════════════════════════════════════════
let S={
  tab:"dashboard",
  products:[],proveedores:[],movements:[],history:[],
  nextProdId:11,nextProvId:6,
  panel:null,form:{},editId:null,deleteId:null,formCil:[],
  fSearch:"",fCat:"",fTipo:"",fCil:"",fProv:"",fCodigo:"",
  sortField:"nombre",sortDir:"asc",
  mov:{productoId:"",tipo:"entrada",cantidad:"",nota:""},
  panelProv:null,formProv:{},editProvId:null,
  provInline:false,
  qr:null,scanCtx:null,
  highlight:null,
};

// ═══════════════════════════════════════════════
// STORAGE
// ═══════════════════════════════════════════════
function persist(){
  try{
    localStorage.setItem("mrr4_p",JSON.stringify(S.products));
    localStorage.setItem("mrr4_pv",JSON.stringify(S.proveedores));
    localStorage.setItem("mrr4_m",JSON.stringify(S.movements));
    localStorage.setItem("mrr4_h",JSON.stringify(S.history));
  }catch(e){}
}
function hydrate(){
  try{
    S.products=JSON.parse(localStorage.getItem("mrr4_p")||"null")||DEF_PROD;
    S.proveedores=JSON.parse(localStorage.getItem("mrr4_pv")||"null")||DEF_PROV;
    S.movements=JSON.parse(localStorage.getItem("mrr4_m")||"[]");
    S.history=JSON.parse(localStorage.getItem("mrr4_h")||"[]");
    S.nextProdId=S.products.length?Math.max(...S.products.map(x=>x.id))+1:11;
    S.nextProvId=S.proveedores.length?Math.max(...S.proveedores.map(x=>x.id))+1:6;
  }catch(e){S.products=DEF_PROD;S.proveedores=DEF_PROV;S.movements=[];S.history=[];}
}

// ═══════════════════════════════════════════════
// HELPERS
// ═══════════════════════════════════════════════
const logH=(a,d)=>{S.history.unshift({id:Date.now(),fecha:TS(),accion:a,detalle:d});if(S.history.length>2000)S.history=S.history.slice(0,2000);};
const getProv=id=>S.proveedores.find(p=>p.id===parseInt(id));
const getProvNombre=id=>{const p=getProv(id);return p?p.nombre:"—";};

function filteredProds(){
  let list=[...S.products];
  if(S.fCodigo){const q=S.fCodigo.toLowerCase();list=list.filter(p=>p.codigo.toLowerCase().includes(q));}
  if(S.fSearch){const q=S.fSearch.toLowerCase();list=list.filter(p=>[p.nombre,p.descripcion,getProvNombre(p.proveedorId)].join(" ").toLowerCase().includes(q));}
  if(S.fCat)list=list.filter(p=>p.categoria===S.fCat);
  if(S.fTipo)list=list.filter(p=>p.tipo===S.fTipo);
  if(S.fCil)list=list.filter(p=>(p.cilindradas||[]).includes(S.fCil));
  if(S.fProv)list=list.filter(p=>String(p.proveedorId)===S.fProv);
  const f=S.sortField,d=S.sortDir;
  return list.sort((a,b)=>{
    let av=f==="proveedor"?getProvNombre(a.proveedorId):a[f];
    let bv=f==="proveedor"?getProvNombre(b.proveedorId):b[f];
    if(typeof av==="string"){av=av.toLowerCase();bv=(bv||"").toLowerCase();}
    return av<bv?(d==="asc"?-1:1):av>bv?(d==="asc"?1:-1):0;
  });
}
function getStats(){
  return{
    skus:S.products.length,
    stock:S.products.reduce((s,p)=>s+p.stock,0),
    low:S.products.filter(p=>p.stock<=(p.stockMin||LOW)).length,
    val:S.products.reduce((s,p)=>s+p.precio*p.stock,0),
    provs:S.proveedores.length,
  };
}
function stockBadge(n,min){
  const th=min>0?min:LOW;
  const c=n===0?["#FCEBEB","#A32D2D"]:n<=th?["#FAEEDA","#854F0B"]:["#EAF3DE","#3B6D11"];
  return`<span style="background:${c[0]};color:${c[1]};border-radius:5px;padding:2px 8px;font-size:12px;font-weight:700">${n}</span>`;
}
function catBadge(c){const col=CAT_C[c]||"#888";return`<span style="font-size:11px;padding:2px 7px;border-radius:4px;border:0.5px solid ${col};color:${col}">${esc(c)}</span>`;}
function cilBadge(c){const col=CIL_C[c]||"#888";return`<span class="tag-cil" style="background:${col}18;border-color:${col};color:${col}">${c}</span>`;}
function tipoBadge(t){const c={["Repuesto original"]:"#3B6D11",["Genérico/Compatible"]:"#5f5e5a",["Aftermarket"]:"#185FA5",["Performance"]:"#993556"}[t]||"#888";return`<span style="font-size:11px;padding:1px 7px;border-radius:4px;background:${c}14;color:${c};border:0.5px solid ${c}22">${esc(t||"")}</span>`;}
function sortArrow(f){if(S.sortField!==f)return`<span style="color:#ccc;margin-left:2px;font-size:10px">↕</span>`;return`<span style="margin-left:2px;font-size:10px">${S.sortDir==="asc"?"↑":"↓"}</span>`;}
function activeFilters(){let n=0;if(S.fCodigo)n++;if(S.fSearch)n++;if(S.fCat)n++;if(S.fTipo)n++;if(S.fCil)n++;if(S.fProv)n++;return n;}
function clearFilters(){S.fCodigo="";S.fSearch="";S.fCat="";S.fTipo="";S.fCil="";S.fProv="";}

// ═══════════════════════════════════════════════
// EXPORTS
// ═══════════════════════════════════════════════
function dl(content,name){const a=document.createElement("a");a.href=URL.createObjectURL(new Blob([content],{type:"text/csv;charset=utf-8"}));a.download=name;a.click();}
function csvRow(arr){return arr.map(v=>`"${String(v||"").replace(/"/g,'""')}"`).join(",");}
function exportProd(){dl("\uFEFF"+[csvRow(["Código","Nombre","Categoría","Tipo","Proveedor","Precio","Stock","StockMín","Cilindradas","Ubicación","Descripción"]),...S.products.map(p=>csvRow([p.codigo,p.nombre,p.categoria,p.tipo,getProvNombre(p.proveedorId),p.precio,p.stock,p.stockMin||0,(p.cilindradas||[]).join(";"),p.ubicacion,p.descripcion]))].join("\n"),"inventario.csv");}
function exportMov(){dl("\uFEFF"+[csvRow(["Fecha","Tipo","Código","Producto","Cant","Antes","Después","Nota"]),...S.movements.map(m=>csvRow([m.fecha,m.tipo,m.codigo,m.nombre,m.cantidad,m.antes,m.despues,m.nota||""]))].join("\n"),"movimientos.csv");}

// ═══════════════════════════════════════════════
// SCANNER
// ═══════════════════════════════════════════════
function openScanner(ctx){S.scanCtx=ctx;S.panel="scanner";render();setTimeout(startScanner,200);}
function startScanner(){
  if(!window.Html5Qrcode){alert("Librería no disponible. Verificá conexión a internet.");S.panel=null;render();return;}
  try{
    S.qr=new Html5Qrcode("qr-vp");
    S.qr.start({facingMode:"environment"},{fps:10,qrbox:{width:260,height:110}},
      code=>{handleScanned(code);},()=>{}
    ).catch(err=>{alert("No se pudo acceder a la cámara.\n"+err);stopScanner();});
  }catch(e){alert("Error: "+e);stopScanner();}
}
function stopScanner(){
  if(S.qr){S.qr.stop().catch(()=>{});S.qr=null;}
  if(S.panel==="scanner"){S.panel=null;render();}
}
function handleScanned(code){
  stopScanner();
  if(S.scanCtx==="search"){
    const p=S.products.find(x=>x.codigo===code);
    if(p){clearFilters();S.fCodigo=code;S.highlight=p.id;S.tab="inventario";render();setTimeout(()=>{S.highlight=null;render();},3000);}
    else if(confirm(`Código "${code}" no encontrado.\n¿Agregar este producto?`))openAddPanel(code);
  }else if(S.scanCtx==="form-codigo"){
    S.form.codigo=code;render();setTimeout(()=>{const el=document.getElementById("f-codigo");if(el)el.value=code;},60);
  }else if(S.scanCtx==="movement"){
    const p=S.products.find(x=>x.codigo===code);
    if(p){S.mov.productoId=String(p.id);render();}
    else alert(`Código "${code}" no encontrado.`);
  }
}

// ═══════════════════════════════════════════════
// CRUD PRODUCTOS
// ═══════════════════════════════════════════════
function openAddPanel(prefill){
  S.form={codigo:prefill||"",nombre:"",categoria:"Frenos",tipo:"Repuesto original",proveedorId:"",precio:"",stock:"0",stockMin:String(LOW),ubicacion:"",descripcion:""};
  S.formCil=[];S.panel="add";S.tab="inventario";
  render();setTimeout(()=>window.scrollTo({top:0,behavior:"smooth"}),50);
}
function openEditPanel(id){
  const p=S.products.find(x=>x.id===id);
  S.form={...p};S.formCil=[...(p.cilindradas||[])];S.editId=id;S.panel="edit";
  render();setTimeout(()=>window.scrollTo({top:0,behavior:"smooth"}),50);
}
function toggleCil(c){
  const i=S.formCil.indexOf(c);
  if(i>=0)S.formCil.splice(i,1);else S.formCil.push(c);
  document.querySelectorAll(".cil-p").forEach(el=>{
    const active=S.formCil.includes(el.dataset.c);
    el.className="pill cil-p"+(active?" active":"");
  });
}
function saveProduct(){
  const g=id=>document.getElementById(id)?.value?.trim()||"";
  const nombre=g("f-nombre"),codigo=g("f-codigo");
  if(!nombre||!codigo){alert("Código y nombre son obligatorios.");return;}
  if(!S.formCil.length){alert("Seleccioná al menos una cilindrada.");return;}
  const provId=parseInt(g("f-prov")||S.form.proveedorId||0);
  if(!provId){alert("Seleccioná un proveedor.");return;}
  const dup=S.products.find(p=>p.codigo===codigo&&p.id!==S.editId);
  if(dup){alert(`Código "${codigo}" ya usado por "${dup.nombre}".`);return;}
  const prod={codigo,nombre,categoria:g("f-cat"),tipo:g("f-tipo"),proveedorId:provId,
    precio:parseFloat(g("f-precio"))||0,stock:parseInt(g("f-stock"))||0,
    stockMin:parseInt(g("f-smin"))||0,ubicacion:g("f-ubic"),descripcion:g("f-desc"),
    cilindradas:[...S.formCil]};
  if(S.panel==="add"){
    S.products.push({...prod,id:S.nextProdId++});
    logH("Producto agregado",`${prod.nombre} | ${prod.codigo} | ${getProvNombre(provId)} | Cil: ${prod.cilindradas.join(",")} | Stock: ${prod.stock}`);
  }else{
    const old=S.products.find(p=>p.id===S.editId);const ch=[];
    if(old.nombre!==prod.nombre)ch.push(`Nombre → "${prod.nombre}"`);
    if(old.precio!==prod.precio)ch.push(`Precio: $${fmt(old.precio)}→$${fmt(prod.precio)}`);
    if(old.stock!==prod.stock)ch.push(`Stock: ${old.stock}→${prod.stock}`);
    if(old.ubicacion!==prod.ubicacion)ch.push(`Ubic: ${old.ubicacion}→${prod.ubicacion}`);
    S.products=S.products.map(p=>p.id===S.editId?{...prod,id:S.editId}:p);
    if(ch.length)logH("Producto editado",`${prod.nombre} | ${ch.join(" | ")}`);
  }
  S.panel=null;persist();render();
}
function confirmDelete(){
  const p=S.products.find(x=>x.id===S.deleteId);
  if(p)logH("Producto eliminado",`${p.nombre} | ${p.codigo}`);
  S.products=S.products.filter(x=>x.id!==S.deleteId);
  S.panel=null;persist();render();
}

function deleteProv(id){
  const p=getProv(id);
  const inUse=S.products.filter(x=>x.proveedorId===id).length;
  if(inUse){alert(`No se puede eliminar "${p.nombre}": tiene ${inUse} producto${inUse>1?"s":""} asignados. Reasignálos primero.`);return;}
  if(!confirm(`¿Eliminar proveedor "${p.nombre}"?`))return;
  S.proveedores=S.proveedores.filter(x=>x.id!==id);
  logH("Proveedor eliminado",p.nombre);persist();render();

function openMovPanel(id){S.mov={productoId:String(id),tipo:"entrada",cantidad:"",nota:""};S.tab="movimientos";render();setTimeout(()=>window.scrollTo({top:0,behavior:"smooth"}),50);}
function registerMov(){
  const{productoId,tipo,cantidad,nota}=S.mov;
  if(!productoId||!cantidad){alert("Seleccioná un producto e ingresá la cantidad.");return;}
  const prod=S.products.find(p=>p.id===parseInt(productoId));if(!prod)return;
  const cant=parseInt(cantidad);if(cant<=0){alert("Cantidad debe ser mayor a 0.");return;}
  const antes=prod.stock;
  let despues=tipo==="entrada"?antes+cant:tipo==="salida"?antes-cant:cant;
  if(tipo==="salida"&&cant>antes){alert(`Stock insuficiente. Hay ${antes} unidades.`);return;}
  S.products=S.products.map(p=>p.id===prod.id?{...p,stock:despues}:p);
  S.movements.unshift({id:Date.now(),fecha:TS(),productoId:prod.id,codigo:prod.codigo,nombre:prod.nombre,tipo,cantidad:cant,antes,despues,nota:nota||""});
  const lbl={entrada:"↑ Entrada de stock",salida:"↓ Salida de stock",ajuste:"⇄ Ajuste de stock"}[tipo];
  logH(lbl,`${prod.nombre} | ${antes} → ${despues}${nota?` | "${nota}"`:"" }`);
  S.mov={productoId:"",tipo:"entrada",cantidad:"",nota:""};
  persist();render();
  setTimeout(()=>{const el=document.getElementById("mov-ok");if(el){el.style.display="block";setTimeout(()=>el&&(el.style.display="none"),3000);}},60);
}

// ═══════════════════════════════════════════════
// DASHBOARD DATA
// ═══════════════════════════════════════════════
function dashData(){
  const salidas=S.movements.filter(m=>m.tipo==="salida");
  const entradas=S.movements.filter(m=>m.tipo==="entrada");

  // Top productos por unidades salidas
  const byProd={};
  salidas.forEach(m=>{byProd[m.productoId]=(byProd[m.productoId]||0)+m.cantidad;});
  const topProds=Object.entries(byProd).sort((a,b)=>b[1]-a[1]).slice(0,6)
    .map(([id,qty])=>({prod:S.products.find(p=>p.id==id),qty})).filter(x=>x.prod);

  // Cilindradas más demandadas
  const byCil={};
  salidas.forEach(m=>{
    const p=S.products.find(x=>x.id===m.productoId);
    if(p)(p.cilindradas||[]).forEach(c=>{byCil[c]=(byCil[c]||0)+m.cantidad;});
  });

  // Stock por categoría (valor $)
  const byCatVal={};
  S.products.forEach(p=>{byCatVal[p.categoria]=(byCatVal[p.categoria]||0)+p.stock*p.precio;});

  // Stock por categoría (unidades)
  const byCatUnits={};
  S.products.forEach(p=>{byCatUnits[p.categoria]=(byCatUnits[p.categoria]||0)+p.stock;});

  // Movimientos por mes (últimos 6 meses aproximado — por posición)
  const movByType={entrada:entradas.length,salida:salidas.length,ajuste:S.movements.filter(m=>m.tipo==="ajuste").length};

  // Alertas
  const alerts=S.products.filter(p=>p.stock<=(p.stockMin||LOW));

  // Proveedor más activo (por entradas)
  const byProv={};
  entradas.forEach(m=>{
    const p=S.products.find(x=>x.id===m.productoId);
    if(p){const pn=getProvNombre(p.proveedorId);byProv[pn]=(byProv[pn]||0)+m.cantidad;}
  });
  const topProvs=Object.entries(byProv).sort((a,b)=>b[1]-a[1]).slice(0,5);

  // Tipo de producto más vendido
  const byTipo={};
  salidas.forEach(m=>{
    const p=S.products.find(x=>x.id===m.productoId);
    if(p){byTipo[p.tipo||"?"]=(byTipo[p.tipo||"?"]||0)+m.cantidad;}
  });

  return{topProds,byCil,byCatVal,byCatUnits,movByType,alerts,topProvs,byTipo,
    totalSalidas:salidas.reduce((s,m)=>s+m.cantidad,0),
    totalEntradas:entradas.reduce((s,m)=>s+m.cantidad,0),
    totalVal:S.products.reduce((s,p)=>s+p.stock*p.precio,0),
  };
}

function barH(label,val,max,color,suffix){
  const pct=max>0?Math.round(val/max*100):0;
  return`<div style="margin-bottom:10px">
    <div style="display:flex;justify-content:space-between;align-items:baseline;margin-bottom:3px">
      <span style="font-size:13px;color:#1a1a18;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:65%">${esc(label)}</span>
      <span style="font-size:13px;font-weight:700;color:${color};flex-shrink:0">${typeof val==="number"&&suffix==="$"?"$"+fmt(Math.round(val)):fmt(val)+(suffix&&suffix!=="$"?" "+suffix:"")}</span>
    </div>
    <div class="bar-track"><div class="bar-fill" style="background:${color};width:${pct}%"></div></div>
  </div>`;
}

    <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:1rem;flex-wrap:wrap;gap:8px">
      <div>
        <div style="font-size:18px;font-weight:800">📋 Historial de cambios</div>

        <button onclick="if(confirm('¿Limpiar historial?')){S.history=[];persist();render()}" class="btn btn-sm btn-danger">🗑</button>

    </div>

              <tr style="${i%2===1?"background:#fafaf9":""}">
                <td style="font-size:11px;color:#5f5e5a;font-family:monospace;white-space:nowrap">${h.fecha}</td>
                <td><span style="background:${s[0]};color:${s[1]};border-radius:4px;padding:2px 8px;font-size:11px;font-weight:700">${esc(h.accion)}</span></td>
                <td style="font-size:13px">${esc(h.detalle)}</td>
              </tr>`;}).join("")
            }
          </tbody>
        </table>
      </div>
      ${S.history.length>0?`<div style="padding:7px 14px;font-size:12px;color:#888780;border-top:0.5px solid #e5e4dc">${S.history.length} eventos</div>`:""}
    </div>

    <!-- Mobile cards -->
    <div class="mobile-cards">
      ${S.history.length===0?`<div class="card" style="padding:2rem"><div class="empty-state">Sin historial aún</div></div>`:histCards}
    </div>
  </div>`;
}

// ═══════════════════════════════════════════════
// RENDER — PROVEEDORES
// ═══════════════════════════════════════════════
function renderProveedores(){
  const showForm=S.panelProv==="add"||S.panelProv==="edit";
  return`<div class="page-pad">
    <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:1rem;flex-wrap:wrap;gap:8px">
      <div>
        <div style="font-size:18px;font-weight:800">🏪 Proveedores</div>
        <div style="font-size:13px;color:#888780;margin-top:2px">${S.proveedores.length} registrados</div>
      </div>
      ${!showForm?`<button onclick="openProvPanel('add')" class="btn btn-primary">+ Nuevo proveedor</button>`:""}
    </div>

    ${showForm?`<div class="card" style="padding:1.25rem;margin-bottom:1.25rem;border-color:${S.panelProv==="add"?"#97C459":"#85B7EB"}">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:1rem">
        <div style="font-size:15px;font-weight:800">${S.panelProv==="add"?"➕ Nuevo proveedor":"✏️ Editar proveedor"}</div>
        <button onclick="S.panelProv=null;render()" class="btn btn-sm">✕</button>
      </div>
      <div class="grid2">
        <div class="col2"><label class="lbl">Nombre *</label><input id="fp-nombre" value="${esc(S.formProv.nombre||"")}" class="finput"></div>
        <div><label class="lbl">Contacto</label><input id="fp-contacto" value="${esc(S.formProv.contacto||"")}" placeholder="Nombre del vendedor" class="finput"></div>
        <div><label class="lbl">Teléfono</label><input id="fp-tel" value="${esc(S.formProv.telefono||"")}" placeholder="0261-4101234" class="finput"></div>
        <div><label class="lbl">Email</label><input id="fp-email" value="${esc(S.formProv.email||"")}" class="finput"></div>
        <div class="col2"><label class="lbl">Notas (pago, entrega, etc.)</label><input id="fp-notas" value="${esc(S.formProv.notas||"")}" placeholder="ej: pago a 30 días, entrega los miércoles" class="finput"></div>
      </div>
      <div style="display:flex;justify-content:flex-end;gap:8px;margin-top:1rem">
        <button onclick="S.panelProv=null;render()" class="btn">Cancelar</button>
        <button onclick="saveProv()" class="btn btn-primary">${S.panelProv==="add"?"✓ Agregar":"✓ Guardar"}</button>
      </div>
    </div>`:""}

    <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(270px,1fr));gap:1rem">
      ${S.proveedores.map(p=>{
        const prods=S.products.filter(x=>x.proveedorId===p.id);
        const lowP=prods.filter(x=>x.stock<=(x.stockMin||LOW)).length;
        return`<div class="card" style="padding:1.1rem">
          <div style="display:flex;align-items:flex-start;justify-content:space-between;gap:8px;margin-bottom:.6rem">
            <div style="font-weight:800;font-size:15px;flex:1">${esc(p.nombre)}</div>
            <span style="background:#f2f1ef;color:#5f5e5a;border-radius:12px;padding:2px 9px;font-size:11px;font-weight:700;flex-shrink:0">${prods.length} prod.</span>
          </div>
          <div style="font-size:12px;color:#5f5e5a;line-height:1.9;border-top:0.5px solid #e5e4dc;padding-top:.6rem;margin-bottom:.75rem">
            ${p.contacto&&p.contacto!=="—"?`<div>👤 ${esc(p.contacto)}</div>`:""}
            ${p.telefono&&p.telefono!=="—"?`<div>📞 ${esc(p.telefono)}</div>`:""}
            ${p.email&&p.email!=="—"?`<div>✉ ${esc(p.email)}</div>`:""}
            ${p.notas?`<div style="color:#888780">💬 ${esc(p.notas)}</div>`:""}
          </div>
          ${lowP?`<div style="background:#FAEEDA;border-radius:5px;padding:4px 10px;font-size:12px;color:#854F0B;margin-bottom:8px;font-weight:600">⚠ ${lowP} producto${lowP>1?"s":""} con stock bajo</div>`:""}
          ${prods.length?`<div style="display:flex;flex-wrap:wrap;gap:3px;margin-bottom:.75rem">
            ${prods.slice(0,3).map(x=>`<span style="background:#f2f1ef;border-radius:4px;padding:2px 6px;font-size:11px;color:#5f5e5a">${esc(x.nombre.length>22?x.nombre.slice(0,21)+"…":x.nombre)}</span>`).join("")}
            ${prods.length>3?`<span style="background:#f2f1ef;border-radius:4px;padding:2px 6px;font-size:11px;color:#888780">+${prods.length-3}</span>`:""}
          </div>`:""}
          <div style="display:flex;gap:6px">
            <button onclick="openProvPanel('edit',${p.id})" class="btn btn-sm btn-info" style="flex:1">Editar</button>
            <button onclick="deleteProv(${p.id})" class="btn btn-sm btn-danger" style="flex:1">Eliminar</button>
          </div>
        </div>`;}).join("")}
    </div>
  </div>`;
}

// ═══════════════════════════════════════════════
// RENDER — MODALS
// ═══════════════════════════════════════════════
function renderModals(){
  let h="";

  if(S.panel==="delete"){
    const p=S.products.find(x=>x.id===S.deleteId);
    h+=`<div class="modal-overlay" onclick="if(event.target===this){S.panel=null;render()}">
      <div class="modal-box" style="max-width:380px">
        <div style="font-size:16px;font-weight:800;margin-bottom:.5rem">Eliminar producto</div>
        <p style="color:#5f5e5a;font-size:14px;margin-bottom:1.25rem">¿Eliminar <strong>"${esc(p?p.nombre:"")}"</strong>?<br><span style="color:#A32D2D">No se puede deshacer.</span></p>
        <div style="display:flex;gap:8px;justify-content:flex-end">
          <button onclick="S.panel=null;render()" class="btn">Cancelar</button>
          <button onclick="confirmDelete()" class="btn btn-danger">✕ Eliminar</button>
        </div>
      </div>
    </div>`;
  }

  if(S.panel==="prov-inline"){
    h+=`<div class="modal-overlay">
      <div class="modal-box">
        <div style="font-size:16px;font-weight:800;margin-bottom:.25rem">➕ Nuevo proveedor</div>
        <div style="background:#E6F1FB;border:0.5px solid #85B7EB;border-radius:6px;padding:8px 12px;margin-bottom:1rem;font-size:12px;color:#185FA5">
          Creá el proveedor y vas a volver al formulario del producto sin perder lo que escribiste.
        </div>
        <div class="grid2">
          <div class="col2"><label class="lbl">Nombre del proveedor *</label><input id="fpi-nombre" value="${esc(S.formProv.nombre||"")}" class="finput" autofocus></div>
          <div><label class="lbl">Contacto</label><input id="fpi-contacto" value="" placeholder="Nombre del vendedor" class="finput"></div>
          <div><label class="lbl">Teléfono</label><input id="fpi-tel" value="" placeholder="0261-..." class="finput"></div>
          <div><label class="lbl">Email</label><input id="fpi-email" value="" class="finput"></div>
          <div class="col2"><label class="lbl">Notas</label><input id="fpi-notas" value="" placeholder="ej: pago a 30 días" class="finput"></div>
        </div>
        <div style="display:flex;gap:8px;justify-content:flex-end;margin-top:1.25rem">
          <button onclick="S.panel='add';S.provInline=false;render()" class="btn">← Volver al producto</button>
          <button onclick="saveProvInline()" class="btn btn-primary">✓ Crear y continuar</button>
        </div>
      </div>
    </div>`;
  }

  if(S.panel==="scanner"){
    const msgs={"search":"Buscá el producto escaneando su código de barras","form-codigo":"Escaneá el código real del producto","movement":"Escaneá para seleccionar el producto en movimientos"};
    h+=`<div class="modal-overlay">
      <div class="modal-box" style="text-align:center">
        <div style="font-size:16px;font-weight:800;margin-bottom:.4rem">📷 Lector de código de barras</div>
        <p style="font-size:13px;color:#5f5e5a;margin-bottom:.75rem">${msgs[S.scanCtx]||""}</p>
        <div id="qr-vp" style="width:100%;border-radius:8px;overflow:hidden;background:#111;min-height:220px"></div>
        <p style="font-size:11px;color:#888780;margin:.5rem 0">EAN-13 · EAN-8 · UPC · Code128 · Code39 · QR</p>
        <div style="background:#FAEEDA;border-radius:6px;padding:8px 12px;margin-bottom:.75rem;font-size:12px;color:#854F0B;text-align:left">
          💡 <strong>Requiere HTTPS.</strong> En GitHub Pages funciona perfecto. Desde <code>file://</code> la cámara puede bloquearse.
        </div>
        <button onclick="stopScanner()" class="btn btn-danger" style="width:100%;padding:10px;font-size:14px">Cancelar</button>
      </div>
    </div>`;
  }

  return h;
}

// ═══════════════════════════════════════════════
// MAIN RENDER
// ═══════════════════════════════════════════════
function render(){
  const root=document.getElementById("root");
  if(!root)return;
  let screen="";
  if(S.tab==="dashboard")screen=renderDashboard();
  else if(S.tab==="inventario")screen=renderInventario();
  else if(S.tab==="movimientos")screen=renderMovimientos();
  else if(S.tab==="historial")screen=renderHistorial();
  else if(S.tab==="proveedores")screen=renderProveedores();
  root.innerHTML=`
    ${renderSidebar()}
    <div id="content">${screen}</div>
    ${renderBottomNav()}
    ${renderModals()}
  `;
}

hydrate();
render();
</script>
</body>
</html>
