<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Motopartes RR — Sistema de Inventario</title>
<script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,-apple-system,sans-serif;background:#f4f4f2;color:#1a1a18;min-height:100vh;font-size:14px}
input,select,textarea,button{font-family:inherit;font-size:inherit}
input:focus,select:focus,textarea:focus{outline:none;box-shadow:0 0 0 2px #BA751740}
button:focus{outline:none}
.btn{padding:7px 14px;border-radius:6px;cursor:pointer;font-size:13px;transition:opacity .15s,transform .1s;border:0.5px solid #d3d1c7;background:#fff;color:#444441}
.btn:hover{opacity:.82}
.btn:active{transform:scale(.97)}
.btn-primary{background:#FAEEDA;border-color:#BA7517;color:#854F0B;font-weight:600}
.btn-danger{background:#FCEBEB;border-color:#f09595;color:#A32D2D}
.btn-info{background:#E6F1FB;border-color:#85B7EB;color:#185FA5}
.btn-success{background:#EAF3DE;border-color:#97C459;color:#3B6D11}
.btn-sm{padding:4px 10px;font-size:12px}
.card{background:#fff;border:0.5px solid #d3d1c7;border-radius:10px;overflow:hidden}
table{border-collapse:collapse;width:100%}
th,td{text-align:left;padding:9px 10px;border-bottom:0.5px solid #e5e4dc;vertical-align:top}
th{font-size:12px;color:#888780;font-weight:500;white-space:nowrap;background:#f9f9f7;cursor:pointer}
th.no-sort{cursor:default}
th:not(.no-sort):hover{color:#1a1a18}
tbody tr:hover td{background:#f4f4f2}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:300;display:flex;align-items:center;justify-content:center;padding:1rem}
.modal-box{background:#fff;border-radius:12px;width:96%;max-width:500px;max-height:92vh;overflow-y:auto;padding:1.5rem;box-shadow:0 24px 64px rgba(0,0,0,.22)}
.modal-box-sm{max-width:400px}
.tab-btn{padding:9px 18px;border:none;background:transparent;cursor:pointer;font-size:13px;color:#5f5e5a;border-bottom:2.5px solid transparent;transition:all .15s;white-space:nowrap}
.tab-btn:hover{color:#1a1a18}
.tab-active{color:#854F0B!important;border-bottom-color:#BA7517!important;font-weight:700}
label.lbl{display:block;font-size:12px;color:#5f5e5a;margin-bottom:3px;margin-top:12px}
label.lbl:first-child{margin-top:0}
.finput{width:100%;padding:8px 10px;font-size:13px;border:0.5px solid #b4b2a9;border-radius:6px;background:#fff;color:#1a1a18}
.finput:focus{box-shadow:0 0 0 2px #BA751740}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.col2{grid-column:1/-1}
.chip{display:inline-block;padding:2px 8px;border-radius:5px;font-size:11px;font-weight:600}
.tag{display:inline-block;padding:1px 7px;border-radius:4px;font-size:11px;border:0.5px solid;margin:1px}
.pill-group{display:flex;flex-wrap:wrap;gap:5px;margin-top:4px}
.pill{padding:4px 10px;border-radius:20px;font-size:12px;cursor:pointer;border:0.5px solid #d3d1c7;background:#fff;color:#5f5e5a;transition:all .12s}
.pill.active{background:#FAEEDA;border-color:#BA7517;color:#854F0B;font-weight:600}
.filter-bar{background:#fff;border:0.5px solid #d3d1c7;border-radius:8px;padding:12px 14px;margin-bottom:1rem}
@media(max-width:700px){.grid2{grid-template-columns:1fr}.col2{grid-column:1}.hide-mob{display:none!important}}
@media(max-width:500px){.hide-xs{display:none!important}}
</style>
</head>
<body>
<div id="root"></div>
<script>
// ═══════════════════════════════════════════
// CONSTANTES
// ═══════════════════════════════════════════
const CATS=["Frenos","Cadenas y piñones","Filtros","Lubricantes","Eléctrico","Carrocería","Suspensión","Motor","Neumáticos","Accesorios"];
const CAT_C={"Frenos":"#E24B4A","Cadenas y piñones":"#BA7517","Filtros":"#185FA5","Lubricantes":"#0F6E56","Eléctrico":"#7F77DD","Carrocería":"#888780","Suspensión":"#D85A30","Motor":"#993556","Neumáticos":"#1D9E75","Accesorios":"#3B6D11"};
const TIPOS_PROD=["Repuesto original","Genérico/Compatible","Aftermarket","Performance"];
const CILINDRADAS=["110cc","125cc","150cc","200cc","250cc+","Universal"];
const CIL_C={"110cc":"#7F77DD","125cc":"#185FA5","150cc":"#0F6E56","200cc":"#D85A30","250cc+":"#993556","Universal":"#888780"};
const LOW=5;
const TS=()=>new Date().toLocaleString("es-AR",{day:"2-digit",month:"2-digit",year:"numeric",hour:"2-digit",minute:"2-digit"});
const esc=s=>String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
const fmt=n=>Number(n).toLocaleString("es-AR");

// ═══════════════════════════════════════════
// DATOS DEFAULT
// ═══════════════════════════════════════════
const DEF_PROV=[
  {id:1,nombre:"Brembo",contacto:"Carlos Méndez",telefono:"0261-4101234",email:"cmendez@brembo.com",notas:"Pago a 30 días"},
  {id:2,nombre:"NGK Argentina",contacto:"Distribuidora Sur",telefono:"0261-4205678",email:"ventas@ngk-ar.com",notas:""},
  {id:3,nombre:"Motul Argentina",contacto:"Depósito central Mendoza",telefono:"0261-4309999",email:"mendoza@motul.com.ar",notas:"Entrega miércoles"},
  {id:4,nombre:"DID Chains",contacto:"Importadora Andina",telefono:"0261-4411111",email:"pedidos@did-ar.com",notas:""},
  {id:5,nombre:"Genérico",contacto:"—",telefono:"—",email:"—",notas:"Productos sin marca específica"},
];

const DEF_PROD=[
  {id:1,codigo:"7790895000719",nombre:"Pastillas de freno delantero",categoria:"Frenos",tipo:"Repuesto original",proveedorId:1,precio:4500,stock:12,stockMin:3,ubicacion:"A-1",descripcion:"Honda CB125, CG150",cilindradas:["125cc","150cc"]},
  {id:2,codigo:"7790895000726",nombre:"Disco de freno trasero 220mm",categoria:"Frenos",tipo:"Aftermarket",proveedorId:1,precio:8900,stock:3,stockMin:2,ubicacion:"A-2",descripcion:"Honda Bros 160, Titan 160",cilindradas:["150cc"]},
  {id:3,codigo:"7897753700028",nombre:"Cadena 428 × 120 eslabones",categoria:"Cadenas y piñones",tipo:"Repuesto original",proveedorId:4,precio:3200,stock:8,stockMin:3,ubicacion:"B-1",descripcion:"Universal 125cc",cilindradas:["125cc"]},
  {id:4,codigo:"7891010703023",nombre:"Filtro de aceite HF116",categoria:"Filtros",tipo:"Repuesto original",proveedorId:5,precio:1200,stock:24,stockMin:5,ubicacion:"C-2",descripcion:"Honda CG150, XR150, Pop100",cilindradas:["125cc","150cc"]},
  {id:5,codigo:"3374650014690",nombre:"Aceite motor 4T 20W50 1L",categoria:"Lubricantes",tipo:"Repuesto original",proveedorId:3,precio:2800,stock:2,stockMin:3,ubicacion:"D-1",descripcion:"Universal 4 tiempos",cilindradas:["Universal"]},
  {id:6,codigo:"4902043100822",nombre:"Bujía NGK CR7HSA",categoria:"Eléctrico",tipo:"Repuesto original",proveedorId:2,precio:950,stock:18,stockMin:5,ubicacion:"E-3",descripcion:"Honda 125cc / 150cc",cilindradas:["125cc","150cc"]},
  {id:7,codigo:"0849197007316",nombre:"Amortiguador trasero 340mm",categoria:"Suspensión",tipo:"Aftermarket",proveedorId:5,precio:12500,stock:5,stockMin:2,ubicacion:"F-1",descripcion:"Honda CG150, Titan 150",cilindradas:["150cc"]},
  {id:8,codigo:"7790001000041",nombre:"Espejo retrovisor universal",categoria:"Accesorios",tipo:"Genérico/Compatible",proveedorId:5,precio:1800,stock:7,stockMin:2,ubicacion:"G-2",descripcion:"Universal",cilindradas:["Universal"]},
  {id:9,codigo:"7790895001100",nombre:"Pastillas de freno Honda Wave 110",categoria:"Frenos",tipo:"Genérico/Compatible",proveedorId:1,precio:2800,stock:9,stockMin:3,ubicacion:"A-3",descripcion:"Honda Wave 110, Biz 110",cilindradas:["110cc"]},
  {id:10,codigo:"7897753700110",nombre:"Cadena 420 × 116 (110cc)",categoria:"Cadenas y piñones",tipo:"Repuesto original",proveedorId:4,precio:2400,stock:6,stockMin:3,ubicacion:"B-2",descripcion:"Yamaha Crypton, Honda Biz 110",cilindradas:["110cc"]},
];

// ═══════════════════════════════════════════
// ESTADO
// ═══════════════════════════════════════════
let S={
  tab:"inventario",
  products:[],proveedores:[],movements:[],history:[],
  nextProdId:11,nextProvId:6,

  // Inventario
  panel:null,       // null|add|edit|delete|scanner|add-prov-inline
  form:{},editId:null,deleteId:null,
  formCilindradas:[],

  // Filtros
  fSearch:"",fCat:"",fTipo:"",fCil:"",fProv:"",fCodigo:"",

  // Movimientos
  mov:{productoId:"",tipo:"entrada",cantidad:"",nota:""},

  // Proveedor en creación inline (desde form de producto)
  provInlineCallback:null,
  formProv:{},editProvId:null,deleteProvId:null,
  panelProv:null,

  // Escáner
  qr:null,scanCtx:null,

  // UI
  highlight:null,sortField:"nombre",sortDir:"asc",
};

// ═══════════════════════════════════════════
// STORAGE
// ═══════════════════════════════════════════
function persist(){
  try{
    localStorage.setItem("mrr3_p",JSON.stringify(S.products));
    localStorage.setItem("mrr3_pv",JSON.stringify(S.proveedores));
    localStorage.setItem("mrr3_m",JSON.stringify(S.movements));
    localStorage.setItem("mrr3_h",JSON.stringify(S.history));
  }catch(e){}
}
function hydrate(){
  try{
    S.products=JSON.parse(localStorage.getItem("mrr3_p")||"null")||DEF_PROD;
    S.proveedores=JSON.parse(localStorage.getItem("mrr3_pv")||"null")||DEF_PROV;
    S.movements=JSON.parse(localStorage.getItem("mrr3_m")||"[]");
    S.history=JSON.parse(localStorage.getItem("mrr3_h")||"[]");
    S.nextProdId=S.products.length?Math.max(...S.products.map(x=>x.id))+1:11;
    S.nextProvId=S.proveedores.length?Math.max(...S.proveedores.map(x=>x.id))+1:6;
  }catch(e){S.products=DEF_PROD;S.proveedores=DEF_PROV;S.movements=[];S.history=[];}
}

// ═══════════════════════════════════════════
// HELPERS
// ═══════════════════════════════════════════
const logH=(accion,detalle)=>{S.history.unshift({id:Date.now(),fecha:TS(),accion,detalle});if(S.history.length>2000)S.history=S.history.slice(0,2000);};
const getProv=id=>S.proveedores.find(p=>p.id===parseInt(id));
const getProvNombre=id=>{const p=getProv(id);return p?p.nombre:"—";};

function filteredProducts(){
  let list=[...S.products];
  if(S.fCodigo){const q=S.fCodigo.toLowerCase();list=list.filter(p=>p.codigo.toLowerCase().includes(q));}
  if(S.fSearch){const q=S.fSearch.toLowerCase();list=list.filter(p=>[p.nombre,p.descripcion,getProvNombre(p.proveedorId)].join(" ").toLowerCase().includes(q));}
  if(S.fCat)list=list.filter(p=>p.categoria===S.fCat);
  if(S.fTipo)list=list.filter(p=>p.tipo===S.fTipo);
  if(S.fCil)list=list.filter(p=>(p.cilindradas||[]).includes(S.fCil));
  if(S.fProv)list=list.filter(p=>String(p.proveedorId)===S.fProv);
  const f=S.sortField,d=S.sortDir;
  return list.sort((a,b)=>{
    let av=f==="proveedor"?getProvNombre(a.proveedorId):a[f];
    let bv=f==="proveedor"?getProvNombre(b.proveedorId):b[f];
    if(typeof av==="string"){av=av.toLowerCase();bv=bv.toLowerCase();}
    return av<bv?(d==="asc"?-1:1):av>bv?(d==="asc"?1:-1):0;
  });
}

function getStats(){
  const ps=S.products;
  return{
    skus:ps.length,
    stock:ps.reduce((s,p)=>s+p.stock,0),
    low:ps.filter(p=>p.stock<=(p.stockMin||LOW)).length,
    val:ps.reduce((s,p)=>s+p.precio*p.stock,0),
    provs:S.proveedores.length,
  };
}

function stockBadge(n,min){
  const th=min>0?min:LOW;
  const st=n===0?"danger":n<=th?"warning":"success";
  const b={danger:["#FCEBEB","#A32D2D"],warning:["#FAEEDA","#854F0B"],success:["#EAF3DE","#3B6D11"]}[st];
  return`<span style="background:${b[0]};color:${b[1]};border-radius:5px;padding:2px 8px;font-size:12px;font-weight:700">${n}</span>`;
}
function catBadge(cat){const c=CAT_C[cat]||"#888";return`<span style="font-size:11px;padding:2px 7px;border-radius:4px;border:0.5px solid ${c};color:${c}">${esc(cat)}</span>`;}
function cilBadge(cil){const c=CIL_C[cil]||"#888";return`<span style="font-size:11px;padding:1px 6px;border-radius:10px;background:${c}18;border:0.5px solid ${c};color:${c};font-weight:600">${cil}</span>`;}
function tipoBadge(t){const c={["Repuesto original"]:"#3B6D11",["Genérico/Compatible"]:"#5f5e5a",["Aftermarket"]:"#185FA5",["Performance"]:"#993556"}[t]||"#888";return`<span style="font-size:11px;padding:1px 7px;border-radius:4px;background:${c}14;color:${c};border:0.5px solid ${c}22">${esc(t)}</span>`;}
function sortArrow(f){if(S.sortField!==f)return`<span style="color:#ccc;margin-left:2px;font-size:10px">↕</span>`;return`<span style="margin-left:2px;font-size:10px">${S.sortDir==="asc"?"↑":"↓"}</span>`;}

function activeFiltersCount(){let n=0;if(S.fCodigo)n++;if(S.fSearch)n++;if(S.fCat)n++;if(S.fTipo)n++;if(S.fCil)n++;if(S.fProv)n++;return n;}
function clearFilters(){S.fCodigo="";S.fSearch="";S.fCat="";S.fTipo="";S.fCil="";S.fProv="";}

// ═══════════════════════════════════════════
// EXPORTS
// ═══════════════════════════════════════════
function dl(content,name){const a=document.createElement("a");a.href=URL.createObjectURL(new Blob([content],{type:"text/csv;charset=utf-8"}));a.download=name;a.click();}
function csvRow(arr){return arr.map(v=>`"${String(v||"").replace(/"/g,'""')}"`).join(",");}
function exportProd(){
  const rows=[csvRow(["Código","Nombre","Categoría","Tipo","Proveedor","Precio","Stock","Stock Mín.","Cilindradas","Ubicación","Descripción"]),...S.products.map(p=>csvRow([p.codigo,p.nombre,p.categoria,p.tipo,getProvNombre(p.proveedorId),p.precio,p.stock,p.stockMin||0,(p.cilindradas||[]).join(";"),p.ubicacion,p.descripcion]))];
  dl("\uFEFF"+rows.join("\n"),"motopartes_rr_inventario.csv");
}
function exportMov(){
  const rows=[csvRow(["Fecha","Tipo","Código","Producto","Cant.","Antes","Después","Nota"]),...S.movements.map(m=>csvRow([m.fecha,m.tipo,m.codigo,m.nombre,m.cantidad,m.antes,m.despues,m.nota||""]))];
  dl("\uFEFF"+rows.join("\n"),"motopartes_rr_movimientos.csv");
}

// ═══════════════════════════════════════════
// SCANNER
// ═══════════════════════════════════════════
function openScanner(ctx){S.scanCtx=ctx;S.panel="scanner";render();setTimeout(startScanner,200);}

function startScanner(){
  if(!window.Html5Qrcode){alert("Librería de escáner no disponible. Verificá la conexión a internet.");S.panel=null;render();return;}
  try{
    S.qr=new Html5Qrcode("qr-viewport");
    S.qr.start({facingMode:"environment"},{fps:10,qrbox:{width:270,height:110}},
      code=>{handleScanned(code);},
      ()=>{}
    ).catch(err=>{alert("No se pudo acceder a la cámara.\n\n"+err+"\n\nNecesitás HTTPS o localhost. GitHub Pages funciona perfectamente.");stopScanner();});
  }catch(e){alert("Error al iniciar: "+e);stopScanner();}
}

function stopScanner(){
  if(S.qr){S.qr.stop().catch(()=>{});S.qr=null;}
  if(S.panel==="scanner"){S.panel=null;render();}
}

function handleScanned(code){
  stopScanner();
  const ctx=S.scanCtx;
  if(ctx==="search"){
    const prod=S.products.find(p=>p.codigo===code);
    if(prod){
      clearFilters();S.fCodigo=code;S.highlight=prod.id;S.tab="inventario";render();
      setTimeout(()=>{S.highlight=null;render();},3500);
    }else{
      if(confirm(`Código "${code}" no encontrado.\n\n¿Agregar este producto al inventario?`)){
        openAddPanel(code);
      }
    }
  }else if(ctx==="form-codigo"){
    S.form.codigo=code;render();
    setTimeout(()=>{const el=document.getElementById("f-codigo");if(el)el.value=code;},60);
  }else if(ctx==="movement"){
    const prod=S.products.find(p=>p.codigo===code);
    if(prod){S.mov.productoId=String(prod.id);render();}
    else alert(`Código "${code}" no encontrado.\nAgregá el producto primero en Inventario.`);
  }
}

// ═══════════════════════════════════════════
// CRUD PRODUCTOS
// ═══════════════════════════════════════════
function openAddPanel(prefill){
  S.form={codigo:prefill||"",nombre:"",categoria:"Frenos",tipo:"Repuesto original",proveedorId:"",precio:"",stock:"0",stockMin:String(LOW),ubicacion:"",descripcion:""};
  S.formCilindradas=[];
  S.panel="add";S.tab="inventario";
  render();setTimeout(()=>window.scrollTo({top:0,behavior:"smooth"}),50);
}

function openEditPanel(id){
  const p=S.products.find(x=>x.id===id);
  S.form={...p};S.formCilindradas=[...(p.cilindradas||[])];S.editId=id;S.panel="edit";
  render();setTimeout(()=>window.scrollTo({top:0,behavior:"smooth"}),50);
}

function openDeletePanel(id){S.deleteId=id;S.panel="delete";render();}

function toggleCilindrada(cil){
  const idx=S.formCilindradas.indexOf(cil);
  if(idx>=0)S.formCilindradas.splice(idx,1);else S.formCilindradas.push(cil);
  const ch=document.querySelectorAll(".cil-pill");
  ch.forEach(el=>{
    const c=el.dataset.cil;
    const active=S.formCilindradas.includes(c);
    el.className="pill"+(active?" active":"");
    el.dataset.cil=c;
  });
}

function saveProduct(){
  const g=id=>document.getElementById(id)?.value?.trim()||"";
  const nombre=g("f-nombre"),codigo=g("f-codigo");
  if(!nombre||!codigo){alert("El código y el nombre son obligatorios.");return;}
  if(!S.formCilindradas.length){alert("Seleccioná al menos una cilindrada compatible.");return;}
  const provId=parseInt(g("f-proveedorid")||S.form.proveedorId||"0");
  if(!provId){alert("Seleccioná un proveedor.");return;}
  const dup=S.products.find(p=>p.codigo===codigo&&p.id!==S.editId);
  if(dup){alert(`El código "${codigo}" ya pertenece a "${dup.nombre}".`);return;}
  const prod={codigo,nombre,categoria:g("f-categoria"),tipo:g("f-tipo"),proveedorId:provId,precio:parseFloat(g("f-precio"))||0,stock:parseInt(g("f-stock"))||0,stockMin:parseInt(g("f-stockmin"))||0,ubicacion:g("f-ubicacion"),descripcion:g("f-descripcion"),cilindradas:[...S.formCilindradas]};
  if(S.panel==="add"){
    S.products.push({...prod,id:S.nextProdId++});
    logH("Producto agregado",`${prod.nombre} | ${prod.codigo} | ${getProvNombre(provId)} | Cil: ${prod.cilindradas.join(",")} | Stock: ${prod.stock}`);
  }else{
    const old=S.products.find(p=>p.id===S.editId);const ch=[];
    if(old.nombre!==prod.nombre)ch.push(`Nombre → "${prod.nombre}"`);
    if(old.precio!==prod.precio)ch.push(`Precio: $${fmt(old.precio)} → $${fmt(prod.precio)}`);
    if(old.stock!==prod.stock)ch.push(`Stock: ${old.stock} → ${prod.stock}`);
    if(old.ubicacion!==prod.ubicacion)ch.push(`Ubic: ${old.ubicacion} → ${prod.ubicacion}`);
    if(JSON.stringify(old.cilindradas)!==JSON.stringify(prod.cilindradas))ch.push(`Cil: ${(old.cilindradas||[]).join(",") || "—"} → ${prod.cilindradas.join(",")}`);
    S.products=S.products.map(p=>p.id===S.editId?{...prod,id:S.editId}:p);
    if(ch.length)logH("Producto editado",`${prod.nombre} | ${ch.join(" | ")}`);
  }
  S.panel=null;persist();render();
}

function confirmDelete(){
  const p=S.products.find(x=>x.id===S.deleteId);
  if(p)logH("Producto eliminado",`${p.nombre} | ${p.codigo}`);
  S.products=S.products.filter(x=>x.id!==S.deleteId);
  S.panel=null;persist();render();
}

// ═══════════════════════════════════════════
// CRUD PROVEEDORES
// ═══════════════════════════════════════════
function openProvPanel(mode,id){
  if(mode==="add"){S.formProv={nombre:"",contacto:"",telefono:"",email:"",notas:""};S.editProvId=null;}
  else{const p=getProv(id);S.formProv={...p};S.editProvId=id;}
  S.panelProv=mode==="add"?"add":"edit";render();
}

// Inline: called from product form when proveedor doesn't exist
function openProvInline(callback){
  S.formProv={nombre:"",contacto:"",telefono:"",email:"",notas:""};
  S.provInlineCallback=callback;
  S.panel="add-prov-inline";render();
}

function saveProvInline(){
  const g=id=>document.getElementById(id)?.value?.trim()||"";
  const nombre=g("fp-nombre");
  if(!nombre){alert("El nombre del proveedor es obligatorio.");return;}
  const prov={id:S.nextProvId++,nombre,contacto:g("fp-contacto"),telefono:g("fp-telefono"),email:g("fp-email"),notas:g("fp-notas")};
  S.proveedores.push(prov);
  logH("Proveedor creado",`${prov.nombre}${prov.telefono?" | "+prov.telefono:""}`);
  persist();
  // Restore product panel and auto-select new provider
  const cb=S.provInlineCallback;
  S.panel="add";S.provInlineCallback=null;
  S.form.proveedorId=prov.id;
  render();
  // Set the select value after render
  setTimeout(()=>{
    const sel=document.getElementById("f-proveedorid");
    if(sel)sel.value=String(prov.id);
    // Show confirmation
    const msg=document.getElementById("prov-created-msg");
    if(msg){msg.style.display="block";setTimeout(()=>{if(msg)msg.style.display="none";},4000);}
  },80);
}

function saveProv(fromTab){
  const g=id=>document.getElementById(id)?.value?.trim()||"";
  const nombre=g("fp-nombre");
  if(!nombre){alert("El nombre es obligatorio.");return;}
  const prov={nombre,contacto:g("fp-contacto"),telefono:g("fp-telefono"),email:g("fp-email"),notas:g("fp-notas")};
  if(S.panelProv==="add"){
    S.proveedores.push({...prov,id:S.nextProvId++});
    logH("Proveedor creado",prov.nombre);
  }else{
    S.proveedores=S.proveedores.map(p=>p.id===S.editProvId?{...prov,id:S.editProvId}:p);
    logH("Proveedor editado",prov.nombre);
  }
  S.panelProv=null;persist();render();
}

function deleteProv(id){
  const p=getProv(id);
  const inUse=S.products.filter(x=>x.proveedorId===id);
  if(inUse.length){
    alert(`No se puede eliminar "${p.nombre}" porque está asignado a ${inUse.length} producto${inUse.length>1?"s":""}.\n\nReasignalo a otro proveedor primero.`);return;
  }
  if(!confirm(`¿Eliminar al proveedor "${p.nombre}"?`))return;
  S.proveedores=S.proveedores.filter(x=>x.id!==id);
  logH("Proveedor eliminado",p.nombre);
  persist();render();
}

function openMovPanel(id){S.mov={productoId:String(id),tipo:"entrada",cantidad:"",nota:""};S.tab="movimientos";render();setTimeout(()=>window.scrollTo({top:0,behavior:"smooth"}),50);}

function registerMov(){
  const{productoId,tipo,cantidad,nota}=S.mov;
  if(!productoId||!cantidad){alert("Seleccioná un producto e ingresá la cantidad.");return;}
  const prod=S.products.find(p=>p.id===parseInt(productoId));
  if(!prod)return;
  const cant=parseInt(cantidad);if(cant<=0){alert("Cantidad debe ser mayor a 0.");return;}
  const antes=prod.stock;
  const despues=tipo==="entrada"?antes+cant:tipo==="salida"?(cant>antes?(alert(`Stock insuficiente. Hay ${antes} unidades.`),null):antes-cant):cant;
  if(despues===null)return;
  S.products=S.products.map(p=>p.id===prod.id?{...p,stock:despues}:p);
  S.movements.unshift({id:Date.now(),fecha:TS(),productoId:prod.id,codigo:prod.codigo,nombre:prod.nombre,tipo,cantidad:cant,antes,despues,nota:nota||""});
  const lbl={entrada:"↑ Entrada de stock",salida:"↓ Salida de stock",ajuste:"⇄ Ajuste de stock"}[tipo];
  logH(lbl,`${prod.nombre} | ${antes} → ${despues}${nota?` | "${nota}"`:"" }`);
  S.mov={productoId:"",tipo:"entrada",cantidad:"",nota:""};
  persist();render();
  setTimeout(()=>{const el=document.getElementById("mov-ok");if(el){el.style.display="block";setTimeout(()=>el&&(el.style.display="none"),3000);}},60);
}

        </select>
        <button onclick="openScanner('movement')" class="btn btn-sm btn-info">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><path d="M14 14h3v3h-3zM18 18h3v3h-3z"/></svg>
        </button>
      </div>
      ${selProd?`<div style="background:#f4f4f2;border-radius:6px;padding:9px 12px;margin-bottom:10px;font-size:12px">
        <div style="font-weight:700;margin-bottom:2px">${esc(selProd.nombre)}</div>
        <div style="color:#5f5e5a">📍 ${esc(selProd.ubicacion)} · Prov: ${esc(getProvNombre(selProd.proveedorId))}</div>
        <div>Cilindradas: ${(selProd.cilindradas||[]).map(cilBadge).join(" ")}</div>
        <div style="margin-top:4px">Stock: <strong style="font-size:16px">${selProd.stock}</strong> u. ${selProd.stock<=(selProd.stockMin||LOW)?`<span style="color:#A32D2D;font-size:11px">⚠ bajo mínimo (${selProd.stockMin||LOW})</span>`:""}</div>
      </div>`:""}
      <label class="lbl">${S.mov.tipo==="ajuste"?"Nuevo total de stock":"Cantidad de unidades"}</label>
      <input type="number" min="1" value="${S.mov.cantidad||""}" oninput="S.mov.cantidad=this.value" placeholder="${S.mov.tipo==="ajuste"?"ej: 15 → el stock queda en 15":"ej: 10"}" class="finput" style="margin-bottom:10px">
      <label class="lbl">Nota (opcional)</label>
      <input type="text" value="${esc(S.mov.nota||"")}" oninput="S.mov.nota=this.value" placeholder="ej: Compra proveedores, inventario físico..." class="finput" style="margin-bottom:12px">
      ${selProd&&S.mov.cantidad?`<div style="background:${TC[S.mov.tipo][0]};border-radius:6px;padding:8px 12px;margin-bottom:10px;font-size:13px;color:${TC[S.mov.tipo][1]};font-weight:700">
        Vista previa: ${selProd.stock} → ${S.mov.tipo==="entrada"?selProd.stock+parseInt(S.mov.cantidad||0):S.mov.tipo==="salida"?selProd.stock-parseInt(S.mov.cantidad||0):parseInt(S.mov.cantidad||0)} unidades
      </div>`:""}
      <button onclick="registerMov()" class="btn btn-primary" style="width:100%;padding:10px;font-size:14px">${TC[S.mov.tipo][2]} · Registrar</button>
    </div>
    <div>
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:.75rem;flex-wrap:wrap;gap:8px">
        <div style="font-size:15px;font-weight:800">Historial de movimientos</div>
        <button onclick="exportMov()" class="btn btn-sm">⬇ CSV</button>
      </div>
      <div class="card">
        <div style="overflow-x:auto">
          <table>
            <thead><tr>
              <th class="no-sort">Fecha</th><th class="no-sort">Tipo</th><th class="no-sort">Producto</th><th class="no-sort">Cant.</th><th class="no-sort">Antes → Después</th><th class="no-sort">Nota</th>
            </tr></thead>
            <tbody>
              ${S.movements.length===0?`<tr><td colspan="6" style="text-align:center;padding:2rem;color:#888780">Sin movimientos aún</td></tr>`:
                S.movements.slice(0,150).map((m,i)=>{
                  const t=TC[m.tipo]||["#f4f4f2","#5f5e5a","?"];
                  return`<tr style="${i%2===1?"background:#fafaf8":""}">
                    <td style="font-size:10px;color:#5f5e5a;font-family:monospace;white-space:nowrap">${m.fecha}</td>
                    <td><span style="background:${t[0]};color:${t[1]};border-radius:4px;padding:2px 6px;font-size:11px;font-weight:700">${m.tipo}</span></td>
                    <td><div style="font-weight:600;font-size:12px">${esc(m.nombre)}</div><div style="font-size:10px;color:#888780;font-family:monospace">${esc(m.codigo)}</div></td>
                    <td style="font-size:15px;font-weight:800;color:${t[1]}">${m.tipo==="entrada"?"+":m.tipo==="salida"?"-":"="}${m.cantidad}</td>
                    <td style="font-size:12px;font-family:monospace;white-space:nowrap">${m.antes} → <strong>${m.despues}</strong></td>
                    <td style="font-size:11px;color:#888780;max-width:130px">${esc(m.nota||"")}</td>
                  </tr>`;
                }).join("")}
            </tbody>
          </table>
        </div>
        ${S.movements.length>0?`<div style="padding:7px 14px;font-size:12px;color:#888780;border-top:0.5px solid #e5e4dc">${S.movements.length} movimiento${S.movements.length!==1?"s":""}</div>`:""}
      </div>
    </div>
  </div>
</div>`;
}

// ═══════════════════════════════════════════
// RENDER — HISTORIAL TAB
// ═══════════════════════════════════════════
function renderHistorial(){
  const styles={"Producto agregado":["#EAF3DE","#3B6D11"],"Producto editado":["#E6F1FB","#185FA5"],"Producto eliminado":["#FCEBEB","#A32D2D"],"↑ Entrada de stock":["#EAF3DE","#3B6D11"],"↓ Salida de stock":["#FCEBEB","#A32D2D"],"⇄ Ajuste de stock":["#E6F1FB","#185FA5"],"Proveedor creado":["#EAF3DE","#0F6E56"],"Proveedor editado":["#E6F1FB","#185FA5"],"Proveedor eliminado":["#FCEBEB","#A32D2D"]};
  return`
<div style="max-width:1200px;margin:0 auto;padding:1.25rem">
  <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:1rem;flex-wrap:wrap;gap:8px">
    <div>
      <div style="font-size:18px;font-weight:800">Historial de cambios</div>
      <div style="font-size:13px;color:#888780;margin-top:2px">Todo lo que pasó en el sistema, con fecha y hora</div>
    </div>
    <div style="display:flex;gap:8px">
      <button onclick="const r=[['Fecha','Acción','Detalle'],...S.history.map(h=>[h.fecha,h.accion,h.detalle])].map(r=>r.map(v=>'\"'+String(v||\"\").replace(/\"/g,'\"\"')+'\"').join(',')).join('\\n');const a=document.createElement('a');a.href=URL.createObjectURL(new Blob(['\\uFEFF'+r],{type:'text/csv;charset=utf-8'}));a.download='historial.csv';a.click()" class="btn btn-sm">⬇ CSV</button>
      <button onclick="if(confirm('¿Limpiar el historial?')){S.history=[];persist();render()}" class="btn btn-sm btn-danger">🗑 Limpiar</button>
    </div>
  </div>
  <div class="card">
    <div style="overflow-x:auto">
      <table>
        <thead><tr><th class="no-sort" style="width:145px">Fecha y hora</th><th class="no-sort" style="width:180px">Acción</th><th class="no-sort">Detalle</th></tr></thead>
        <tbody>
          ${S.history.length===0?`<tr><td colspan="3" style="text-align:center;padding:2.5rem;color:#888780">Sin cambios registrados aún</td></tr>`:
            S.history.map((h,i)=>{const s=styles[h.accion]||["#f4f4f2","#5f5e5a"];return`
            <tr style="${i%2===1?"background:#fafaf8":""}">
              <td style="font-size:11px;color:#5f5e5a;font-family:monospace;white-space:nowrap">${h.fecha}</td>
              <td><span style="background:${s[0]};color:${s[1]};border-radius:4px;padding:2px 8px;font-size:11px;font-weight:700;white-space:nowrap">${esc(h.accion)}</span></td>
              <td style="font-size:13px">${esc(h.detalle)}</td>
            </tr>`;}).join("")
          }
        </tbody>
      </table>
    </div>
    ${S.history.length>0?`<div style="padding:7px 14px;font-size:12px;color:#888780;border-top:0.5px solid #e5e4dc">${S.history.length} eventos</div>`:""}
  </div>
</div>`;
}

// ═══════════════════════════════════════════
// RENDER — PROVEEDORES TAB
// ═══════════════════════════════════════════
function renderProveedores(){
  const showForm=S.panelProv==="add"||S.panelProv==="edit";
  const provForm=showForm?`
  <div class="card" style="padding:1.25rem;margin-bottom:1.25rem;border-color:${S.panelProv==="add"?"#97C459":"#85B7EB"}">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:1rem">
      <div style="font-size:15px;font-weight:800">${S.panelProv==="add"?"➕ Nuevo proveedor":"✏️ Editar proveedor"}</div>
      <button onclick="S.panelProv=null;render()" class="btn btn-sm">✕ Cancelar</button>
    </div>
    ${renderProvForm("fp-")}
    <div style="display:flex;justify-content:flex-end;gap:8px;margin-top:1rem">
      <button onclick="S.panelProv=null;render()" class="btn">Cancelar</button>
      <button onclick="saveProv(true)" class="btn btn-primary">${S.panelProv==="add"?"✓ Agregar proveedor":"✓ Guardar cambios"}</button>
    </div>
  </div>`:"";

  return`
<div style="max-width:1200px;margin:0 auto;padding:1.25rem">
  <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:1rem;flex-wrap:wrap;gap:8px">
    <div>
      <div style="font-size:18px;font-weight:800">Proveedores</div>
      <div style="font-size:13px;color:#888780;margin-top:2px">${S.proveedores.length} proveedor${S.proveedores.length!==1?"es":""} registrado${S.proveedores.length!==1?"s":""}</div>
    </div>
    ${!showForm?`<button onclick="openProvPanel('add')" class="btn btn-primary">+ Nuevo proveedor</button>`:""}
  </div>

  ${provForm}

  <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:1rem">
    ${S.proveedores.map(p=>{
      const prods=S.products.filter(x=>x.proveedorId===p.id);
      return`
      <div class="card" style="padding:1.1rem">
        <div style="display:flex;align-items:flex-start;justify-content:space-between;gap:8px;margin-bottom:.6rem">
          <div>
            <div style="font-weight:800;font-size:15px">${esc(p.nombre)}</div>
            ${p.contacto&&p.contacto!=="—"?`<div style="font-size:12px;color:#5f5e5a;margin-top:1px">👤 ${esc(p.contacto)}</div>`:""}
          </div>
          <span style="background:#f4f4f2;color:#5f5e5a;border-radius:12px;padding:2px 9px;font-size:11px;font-weight:700;white-space:nowrap;flex-shrink:0">${prods.length} producto${prods.length!==1?"s":""}</span>
        </div>
        <div style="font-size:12px;color:#5f5e5a;line-height:1.8;border-top:0.5px solid #e5e4dc;padding-top:.6rem;margin-bottom:.75rem">
          ${p.telefono&&p.telefono!=="—"?`<div>📞 ${esc(p.telefono)}</div>`:""}
          ${p.email&&p.email!=="—"?`<div>✉ ${esc(p.email)}</div>`:""}
          ${p.notas?`<div style="color:#888780;margin-top:3px">💬 ${esc(p.notas)}</div>`:""}
        </div>
        ${prods.length?`<div style="display:flex;flex-wrap:wrap;gap:3px;margin-bottom:.75rem">
          ${prods.slice(0,4).map(x=>`<span style="background:#f4f4f2;border-radius:4px;padding:2px 6px;font-size:11px;color:#5f5e5a">${esc(x.nombre.length>25?x.nombre.slice(0,24)+"…":x.nombre)}</span>`).join("")}
          ${prods.length>4?`<span style="background:#f4f4f2;border-radius:4px;padding:2px 6px;font-size:11px;color:#888780">+${prods.length-4} más</span>`:""}
        </div>`:""}
        <div style="display:flex;gap:6px">
          <button onclick="openProvPanel('edit',${p.id})" class="btn btn-sm btn-info" style="flex:1">Editar</button>
          <button onclick="deleteProv(${p.id})" class="btn btn-sm btn-danger" style="flex:1">Eliminar</button>
        </div>
      </div>`;
    }).join("")}
  </div>
</div>`;
}

function renderProvForm(pfx){
  const f=S.formProv;
  return`
  <div class="grid2">
    <div class="col2">
      <label class="lbl">Nombre del proveedor *</label>
      <input id="${pfx}nombre" value="${esc(f.nombre||"")}" class="finput">
    </div>
    <div>
      <label class="lbl">Contacto</label>
      <input id="${pfx}contacto" value="${esc(f.contacto||"")}" placeholder="Nombre del vendedor/representante" class="finput">
    </div>
    <div>
      <label class="lbl">Teléfono</label>
      <input id="${pfx}telefono" value="${esc(f.telefono||"")}" placeholder="ej: 0261-4101234" class="finput">
    </div>
    <div>
      <label class="lbl">Email</label>
      <input id="${pfx}email" value="${esc(f.email||"")}" placeholder="ventas@proveedor.com" class="finput">
    </div>
    <div class="col2">
      <label class="lbl">Notas (condiciones de pago, días de entrega, etc.)</label>
      <input id="${pfx}notas" value="${esc(f.notas||"")}" placeholder="ej: Pago a 30 días, entrega los miércoles" class="finput">
    </div>
  </div>`;
}

// ═══════════════════════════════════════════
// RENDER — MODALS
// ═══════════════════════════════════════════
function renderModals(){
  let html="";

  // Delete product
  if(S.panel==="delete"){
    const p=S.products.find(x=>x.id===S.deleteId);
    html+=`<div class="modal-overlay" onclick="if(event.target===this){S.panel=null;render()}">
      <div class="modal-box modal-box-sm">
        <div style="font-size:16px;font-weight:800;margin-bottom:.5rem">Eliminar producto</div>
        <p style="color:#5f5e5a;font-size:14px;margin-bottom:1.25rem">¿Eliminar <strong>"${esc(p?p.nombre:"")}"</strong>?<br><span style="color:#A32D2D">Esta acción no se puede deshacer.</span></p>
        <div style="display:flex;gap:8px;justify-content:flex-end">
          <button onclick="S.panel=null;render()" class="btn">Cancelar</button>
          <button onclick="confirmDelete()" class="btn btn-danger">✕ Eliminar</button>
        </div>
      </div>
    </div>`;
  }

  // Add proveedor inline (desde form de producto)
  if(S.panel==="add-prov-inline"){
    html+=`<div class="modal-overlay">
      <div class="modal-box">
        <div style="display:flex;align-items:center;gap:8px;margin-bottom:.25rem">
          <div style="font-size:16px;font-weight:800">➕ Nuevo proveedor</div>
        </div>
        <div style="background:#E6F1FB;border:0.5px solid #85B7EB;border-radius:6px;padding:8px 12px;margin-bottom:1rem;font-size:12px;color:#185FA5">
          Completá los datos del proveedor. Una vez creado, vas a poder continuar cargando el producto sin perder lo que ya escribiste.
        </div>
        ${renderProvForm("fp-")}
        <div style="display:flex;gap:8px;justify-content:flex-end;margin-top:1.25rem">
          <button onclick="S.panel='add';S.provInlineCallback=null;render()" class="btn">Cancelar</button>
          <button onclick="saveProvInline()" class="btn btn-primary">✓ Crear proveedor y continuar</button>
        </div>
      </div>
    </div>`;
  }

  // Scanner
  if(S.panel==="scanner"){
    const msgs={"search":"Apuntá al código de barras del producto para buscarlo","form-codigo":"Escaneá el código real del producto","movement":"Escaneá para seleccionar el producto"};
    html+=`<div class="modal-overlay">
      <div class="modal-box" style="text-align:center">
        <div style="font-size:16px;font-weight:800;margin-bottom:.4rem">📷 Lector de código de barras</div>
        <p style="font-size:13px;color:#5f5e5a;margin-bottom:.75rem">${msgs[S.scanCtx]||"Apuntá al código"}</p>
        <div id="qr-viewport" style="width:100%;border-radius:8px;overflow:hidden;background:#111;min-height:220px"></div>
        <p style="font-size:11px;color:#888780;margin-top:.5rem">Soporta EAN-13, EAN-8, UPC, Code128, Code39, QR y más</p>
        <div style="background:#FAEEDA;border-radius:6px;padding:8px 12px;margin-top:.6rem;font-size:12px;color:#854F0B;text-align:left">
          💡 <strong>Requiere HTTPS.</strong> En GitHub Pages funciona perfecto. Desde <code>file://</code> local puede fallar en Chrome/Android.
        </div>
        <button onclick="stopScanner()" class="btn btn-danger" style="margin-top:.75rem;width:100%;padding:10px;font-size:14px">Cancelar escaneo</button>
      </div>
    </div>`;
  }

  return html;
}

// ═══════════════════════════════════════════
// MAIN RENDER
// ═══════════════════════════════════════════
function render(){
  const root=document.getElementById("root");
  if(!root)return;
  let tab="";
  if(S.tab==="inventario")tab=renderInventario();
  else if(S.tab==="movimientos")tab=renderMovimientos();
  else if(S.tab==="historial")tab=renderHistorial();
  else if(S.tab==="proveedores")tab=renderProveedores();
  root.innerHTML=renderHeader()+tab+renderModals();
}

// ═══════════════════════════════════════════
// BOOT
// ═══════════════════════════════════════════
hydrate();
render();
</script>
</body>
</html>
